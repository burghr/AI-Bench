<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agent-bench results viewer</title>
<style>
  :root {
    --fg: #1a1d21; --muted: #6b7280; --border: #e5e7eb; --hl: #f9fafb;
    --acc: #2563eb; --acc-soft: #dbeafe;
    --good: #16a34a; --good-soft: #dcfce7;
    --bad:  #dc2626; --bad-soft:  #fee2e2;
    --warn: #d97706; --warn-soft: #fef3c7;
    --bg: #fafbfc;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem;
    color: var(--fg); line-height: 1.5;
  }
  h1 {
    margin: 0 0 0.25rem; font-size: 1.9rem; letter-spacing: -0.02em;
    background: linear-gradient(90deg, #111827 0%, #4b5563 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h2 {
    margin-top: 2.5rem; margin-bottom: 0.75rem;
    font-size: 1.15rem; letter-spacing: -0.01em; color: #111827;
    text-transform: uppercase; font-weight: 600;
  }
  h3 { margin: 1rem 0 0.4rem; font-size: 1rem; color: #111827; font-weight: 600; }
  code { background: var(--hl); padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }

  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
  .meta strong { color: var(--fg); }

  .dropzone {
    border: 2px dashed #cbd5e1; border-radius: 12px; padding: 2.25rem;
    text-align: center; color: var(--muted); cursor: pointer;
    background: #fff;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
  }
  .dropzone:hover { border-color: var(--acc); color: var(--acc); }
  .dropzone:active { transform: scale(0.998); }
  .dropzone.hover { background: var(--acc-soft); border-color: var(--acc); color: var(--acc); }
  .dropzone input { display: none; }
  .dropzone strong { color: var(--fg); }

  /* Tables — card-like, subtle borders, no full grid */
  .tbl-wrap {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    margin: 0.5rem 0 1rem;
  }
  table { border-collapse: collapse; width: 100%;
    font-variant-numeric: tabular-nums; font-size: 0.92rem; }
  th, td { padding: 9px 14px; text-align: left; vertical-align: middle;
    border-bottom: 1px solid var(--border); }
  thead th {
    background: var(--hl); font-weight: 600; color: #374151;
    font-size: 0.78rem; letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f8fafc; }
  th[title] { cursor: help; }
  th[title]::after {
    content: " ⓘ"; color: #9ca3af; font-size: 0.78rem;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.label { font-weight: 600; color: var(--fg); white-space: nowrap; }

  /* Winner / loser highlighting */
  td.winner {
    background: var(--good-soft) !important; color: #14532d; font-weight: 600;
    position: relative;
  }
  td.winner::before {
    content: "★"; color: var(--good); margin-right: 4px; font-size: 0.85em;
  }
  td.loser  { color: #6b7280; }

  /* Mini bar charts */
  .bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 80px; }
  .bar { flex: 1; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--acc); border-radius: 3px; }
  .bar-fill.good { background: var(--good); }
  .bar-fill.warn { background: var(--warn); }
  .bar-num { font-variant-numeric: tabular-nums; font-size: 0.88em; min-width: 50px; text-align: right; }

  pre { background: var(--hl); padding: 1rem 1.1rem; border-radius: 8px;
    white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem;
    border: 1px solid var(--border);
  }
  .combo { margin-top: 1.2rem; }
  .legend { font-size: 0.85rem; color: var(--muted); margin-top: 0.6rem;
    background: var(--hl); padding: 0.6rem 0.9rem; border-radius: 6px;
    border-left: 3px solid var(--acc);
  }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .badge-yes { background: var(--good-soft); color: var(--good); }
  .badge-no  { background: var(--bad-soft);  color: var(--bad); }
  .badge-na  { background: var(--hl); color: var(--muted); }

  .hidden { display: none; }
  .err {
    color: var(--bad); background: var(--bad-soft); padding: 0.6rem 0.9rem;
    border-radius: 6px; margin: 0.75rem 0; font-size: 0.9rem;
  }
  .err:empty { display: none; }

  /* Loaded files chips */
  .loaded-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 0.75rem 0; }
  .loaded-list:empty { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 6px 4px 12px; font-size: 0.85rem;
  }
  .chip .swatch { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .chip .name { font-weight: 600; }
  .chip .sub  { color: var(--muted); font-size: 0.78rem; }
  .chip .x {
    border: none; background: transparent; cursor: pointer; color: var(--muted);
    width: 22px; height: 22px; border-radius: 50%; line-height: 1;
  }
  .chip .x:hover { background: var(--bad-soft); color: var(--bad); }

  /* Run-color swatch in table cells */
  td.run-cell { white-space: nowrap; }
  td.run-cell .swatch { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  tr.combo-divider td {
    border-top: 2px solid var(--border); background: var(--hl);
    font-weight: 600; font-size: 0.78rem; letter-spacing: 0.04em;
    text-transform: uppercase; color: #374151;
  }
</style>
</head>
<body>

<h1>agent-bench results viewer</h1>
<div class="meta">Drop one or more <code>results.json</code> files here to compare runs side-by-side. Hover any column header for an explanation.</div>

<div class="dropzone" id="dz" role="button" tabindex="0">
  <input type="file" id="filein" accept="application/json,.json" multiple>
  <div><strong>Choose results.json file(s)</strong> or drop them here</div>
  <div style="margin-top:0.4rem; font-size:0.85rem;">
    Pick multiple files (or drag & drop several) to compare across machines/runs.
  </div>
</div>

<div id="loaded" class="loaded-list"></div>
<div id="err" class="err"></div>
<main id="report" class="hidden"></main>

<script>
const FIELD_DOCS = {
  agent:   "The CLI/agent under test (e.g. pi, opencode). Each agent has its own startup cost, system prompt, and tool-call overhead — that's what we're trying to measure.",
  backend: "The local LLM server (e.g. ollama, lmstudio). Same model can perform differently across backends due to quantization, scheduler, and runtime choices.",
  model:   "The model id from your config (e.g. gemma4, qwen3.6). The actual provider-specific alias may differ — see results.json for the exact string passed to each agent.",
  run:     "Which loaded results file this row came from. Inferred from the file's CPU + timestamp (e.g. 'Apple M2 Pro · 5/4 11:29'). Different runs can be different machines, dates, or configs — the comparison table groups them by combo so you can see how the same agent+backend+model performed across them.",
  metric:  "Which scalar from the run summary is being compared. Wall median is the headline 'how long did this take' number (lower is better). Throughput is tokens/sec end-to-end (higher is better). Both are from the agent's perspective — for the model's raw speed, see the Direct backend stats section.",
  combo: "Which agent + LLM backend was tested. Format is agent+backend — e.g. 'pi+ollama' means the pi CLI was talking to a model served by Ollama. Lets you compare the same model across different agent harnesses.",
  wall_median: "Wall time = total elapsed seconds from launching the agent until its final byte of output. It's literally how long you'd wait by the clock on the wall. Includes model loading, prompt processing, generation, and any agent overhead. 'Median' is the middle value across iterations — robust against a single slow outlier.",
  wall_mean: "Average wall time across iterations. More sensitive to outliers than median; if mean and median diverge, runs were inconsistent.",
  wall_stdev: "Population standard deviation of wall time across iterations. Roughly: how much each run varied from the average. Lower = more consistent. A high stdev with a slow first run usually means the model was cold-loading.",
  ttft_mean: "Time-to-first-token (mean): how many seconds passed between launching the agent and the first character of output appearing on stdout. Lower = the agent feels snappier. Only meaningful when 'streamed' is yes; if streamed is no, the agent buffered everything until the end and ttft equals wall time.",
  throughput: "End-to-end output speed in tokens per second = estimated output tokens ÷ wall time. This includes ALL overhead (model load, prompt processing, agent startup), not just raw generation. So a low number doesn't necessarily mean slow generation — it can mean the agent has heavy setup.",
  streamed: "Did the agent emit output incrementally as the model generated it? yes = streaming (output appears progressively); no = the agent buffered the entire response and printed it at the very end. When no, time-to-first-token is meaningless because the first byte arrives at the same moment as the last byte.",
  html: "Across all iterations, did every captured output look like an HTML document (contains <html or <!doctype)? A quick sanity check that the model produced HTML rather than refusing the prompt or asking clarifying questions.",
  buttons: "Across all iterations, did every captured output contain at least one <button tag? More targeted check matching this benchmark's prompt, which asks for two buttons.",
  iter: "Iteration number (0-indexed). Warmup runs are excluded from this table — only the timed runs count.",
  wall_s: "Wall time for this single iteration in seconds — from launching the agent until its last byte of output. Same definition as 'wall median' in the summary above, just for one specific iteration.",
  ttft_s: "Time-to-first-token for this single iteration, in seconds. Null if no output was captured at all (process errored before any output).",
  chars: "Total characters of stdout captured for this iteration. Useful for spotting tiny refusal/clarification responses (~100 chars) versus real code generations (~1000s of chars).",
  tokens_est: "Rough output token estimate using chars ÷ 4. Real tokenization is model-dependent, but this is in the right ballpark for English/code and lets you compare runs against each other.",
  tok_per_s: "Estimated tokens per second for this iteration = estimated tokens ÷ wall time. Includes all overhead, not just raw generation.",
  rc: "Process return code. 0 means a clean exit. Non-zero means the process errored. Negative values are POSIX signals — for example, -15 = SIGTERM (the script killed it after a hang).",
  output: "Filename of the captured raw output, located in the same results directory as this results.json. If the model produced HTML, you can open the file directly in a browser to see whether the generated site actually works."
};

const $ = sel => document.querySelector(sel);
const dz = $('#dz'), filein = $('#filein'), errEl = $('#err'), report = $('#report'), loadedEl = $('#loaded');

// State: array of { id, label, color, data }
const state = { sets: [], nextId: 1 };
const PALETTE = ['#2563eb', '#16a34a', '#d97706', '#dc2626', '#9333ea', '#0891b2', '#65a30d', '#db2777'];

dz.addEventListener('click', () => filein.click());
dz.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); filein.click(); } });
filein.addEventListener('change', e => loadFiles(e.target.files));
['dragover','dragenter'].forEach(ev => dz.addEventListener(ev, e => {
  e.preventDefault(); dz.classList.add('hover');
}));
['dragleave','dragend','drop'].forEach(ev => dz.addEventListener(ev, () => dz.classList.remove('hover')));
dz.addEventListener('drop', e => {
  e.preventDefault();
  loadFiles(e.dataTransfer.files);
});

async function loadFiles(fileList) {
  errEl.textContent = '';
  for (const file of Array.from(fileList || [])) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const id = state.nextId++;
      const color = PALETTE[(id - 1) % PALETTE.length];
      const label = labelFor(file.name, data);
      state.sets.push({ id, label, color, data, filename: file.name });
    } catch (e) {
      errEl.textContent += (errEl.textContent ? '\n' : '') + `Failed to parse ${file.name}: ${e.message}`;
    }
  }
  // Reset input so the same file can be re-loaded after removal.
  filein.value = '';
  renderAll();
}

function labelFor(filename, data) {
  // Prefer the precise CPU brand string when bench.py provided it.
  // Falls back to arch family if running on an older results.json.
  const ts = data.timestamp || '';
  const plat = data.platform || '';
  const cpu = (data.cpu || '').trim();
  let cpuShort = '';
  if (cpu) {
    cpuShort = cpu
      .replace(/Apple\s+/i, '')                       // 'Apple M2 Pro' → 'M2 Pro'
      .replace(/\(R\)|\(TM\)/g, '')                   // 'Intel(R) Core(TM)...' → 'Intel Core...'
      .replace(/\s+CPU\s*@\s*\d.*$/i, '')             // strip ' CPU @ 2.30GHz'
      .replace(/\s+\d+-Core Processor.*/i, '')        // 'AMD Ryzen 9 5900X 12-Core Processor' → 'AMD Ryzen 9 5900X'
      .trim();
  } else {
    if (/arm64|aarch64/.test(plat)) cpuShort = 'Apple Silicon';
    else if (/x86_64|amd64/.test(plat)) cpuShort = 'Intel/x86';
  }
  const m = ts.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})/);
  const tstr = m ? `${+m[2]}/${+m[3]} ${m[4]}:${m[5]}` : ts;
  return [cpuShort, tstr].filter(Boolean).join(' · ') || filename;
}

function removeSet(id) {
  state.sets = state.sets.filter(s => s.id !== id);
  renderAll();
}

function esc(v) {
  if (v === null || v === undefined) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function badge(b) {
  if (b === true)  return '<span class="badge badge-yes">yes</span>';
  if (b === false) return '<span class="badge badge-no">no</span>';
  return '<span class="badge badge-na">–</span>';
}
function num(v, dp = 2) {
  if (v === null || v === undefined || v === '') return '–';
  const n = Number(v);
  if (!isFinite(n)) return esc(v);
  return n.toFixed(dp);
}
function th(label, key, opts={}) {
  const cls = opts.num ? 'num' : '';
  const title = FIELD_DOCS[key] ? ` title="${esc(FIELD_DOCS[key])}"` : '';
  return `<th class="${cls}"${title}>${esc(label)}</th>`;
}

// Find best index. dir: 'min' or 'max'. Ignores null/undefined/NaN.
function bestIdx(values, dir) {
  let best = -1, bv = null;
  values.forEach((v, i) => {
    if (v === null || v === undefined) return;
    const n = Number(v);
    if (!isFinite(n)) return;
    if (best === -1 || (dir === 'min' ? n < bv : n > bv)) { best = i; bv = n; }
  });
  return best;
}
// Returns 'winner' | 'loser' | '' for cell at index i given column direction
function rankCls(values, i, dir) {
  const valid = values.map(Number).filter(n => isFinite(n));
  if (valid.length < 2) return '';
  const best = bestIdx(values, dir);
  if (i === best) return 'winner';
  return 'loser';
}
function bar(value, max, klass='') {
  if (value === null || value === undefined || !isFinite(value) || max <= 0) return num(value, 2);
  const pct = Math.max(2, Math.min(100, (value / max) * 100));
  return `<span class="bar-wrap"><span class="bar"><span class="bar-fill ${klass}" style="width:${pct}%"></span></span><span class="bar-num">${num(value, 2)}</span></span>`;
}

function renderAll() {
  // Render the loaded chips. Tooltip shows the full CPU brand string + filename.
  loadedEl.innerHTML = state.sets.map(s => {
    const tip = [s.data.cpu, s.data.platform, s.filename].filter(Boolean).join(' · ');
    return `<span class="chip" data-id="${s.id}" title="${esc(tip)}">
       <span class="swatch" style="background:${s.color}"></span>
       <span class="name">${esc(s.label)}</span>
       <button class="x" aria-label="Remove" data-rm="${s.id}">×</button>
     </span>`;
  }).join('');
  loadedEl.querySelectorAll('button[data-rm]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); removeSet(+btn.dataset.rm); });
  });

  if (state.sets.length === 0) {
    report.innerHTML = '';
    report.classList.add('hidden');
    return;
  }
  if (state.sets.length === 1) {
    renderSingle(state.sets[0]);
  } else {
    renderCompare(state.sets);
  }
  report.classList.remove('hidden');
}

function renderSingle(set) {
  render(set.data);
}

function renderCompare(sets) {
  // Collect every unique combo label across all sets.
  const comboMap = new Map(); // label -> { agent, backend, model_id, rows: [{set, summary}] }
  for (const s of sets) {
    for (const c of (s.data.combos || [])) {
      if (!comboMap.has(c.label)) {
        const parts = (c.label || '').split('+');
        comboMap.set(c.label, {
          label: c.label,
          agent:   c.agent   || parts[0] || '',
          backend: c.backend || parts[1] || '',
          model:   c.model_id|| parts[2] || '',
          rows: [],
        });
      }
      comboMap.get(c.label).rows.push({ set: s, summary: c.summary || {} });
    }
  }

  let html = '';
  // Header
  html += `<div class="meta">Comparing <strong>${sets.length}</strong> result sets across <strong>${comboMap.size}</strong> combo${comboMap.size===1?'':'s'}. ★ marks the winner per metric within each combo.</div>`;

  // Comparison table
  html += '<h2>Comparison</h2><div class="tbl-wrap"><table><thead><tr>';
  html += th('Combo',         'combo');
  html += th('Run',           'run');
  html += th('wall median (s)', 'wall_median', {num:true});
  html += th('wall mean (s)',   'wall_mean',   {num:true});
  html += th('wall stdev',      'wall_stdev',  {num:true});
  html += th('ttft mean (s)',   'ttft_mean',   {num:true});
  html += th('throughput tok/s','throughput',  {num:true});
  html += th('streamed',        'streamed');
  html += th('valid HTML',      'html');
  html += th('buttons',         'buttons');
  html += '</tr></thead><tbody>';

  // Sort combos for consistent display
  const sortedCombos = Array.from(comboMap.values()).sort((a, b) => a.label.localeCompare(b.label));
  for (const c of sortedCombos) {
    const cols = {
      med:   c.rows.map(r => r.summary.wall_s_median),
      mean:  c.rows.map(r => r.summary.wall_s_mean),
      stdev: c.rows.map(r => r.summary.wall_s_stdev),
      ttft:  c.rows.map(r => r.summary.ttft_s_mean),
      tps:   c.rows.map(r => r.summary.throughput_tok_per_s_mean_est),
    };
    const maxOf = arr => Math.max(...arr.map(Number).filter(n => isFinite(n)), 0);
    const maxes = { med: maxOf(cols.med), mean: maxOf(cols.mean), ttft: maxOf(cols.ttft), tps: maxOf(cols.tps) };

    c.rows.forEach((r, i) => {
      const s = r.summary;
      html += '<tr>';
      if (i === 0) {
        html += `<td class="label" rowspan="${c.rows.length}">${esc(c.label)}</td>`;
      }
      html += `<td class="run-cell"><span class="swatch" style="background:${r.set.color}"></span>${esc(r.set.label)}</td>`;
      html += `<td class="num ${rankCls(cols.med, i, 'min')}">${bar(s.wall_s_median, maxes.med)}</td>`;
      html += `<td class="num ${rankCls(cols.mean, i, 'min')}">${bar(s.wall_s_mean, maxes.mean)}</td>`;
      html += `<td class="num ${rankCls(cols.stdev, i, 'min')}">${num(s.wall_s_stdev, 2)}</td>`;
      html += `<td class="num ${rankCls(cols.ttft, i, 'min')}">${num(s.ttft_s_mean, 2)}</td>`;
      html += `<td class="num ${rankCls(cols.tps, i, 'max')}">${bar(s.throughput_tok_per_s_mean_est, maxes.tps, 'good')}</td>`;
      html += `<td>${badge(s.streamed_all)}</td>`;
      html += `<td>${badge(s.all_runs_html)}</td>`;
      html += `<td>${badge(s.all_runs_have_buttons)}</td>`;
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';
  html += `<p class="legend">★ marks the fastest/best value within each combo across the loaded runs. Lower is better for wall/ttft/stdev; higher for throughput.</p>`;

  // Pivoted speedup table when exactly two sets are loaded.
  if (sets.length === 2) {
    const A = sets[0], B = sets[1];
    html += `<h2>Head-to-head: ${esc(A.label)} vs ${esc(B.label)}</h2>`;
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += th('Combo','combo');
    html += th('Metric','metric');
    html += `<th class="num">${esc(A.label)}</th>`;
    html += `<th class="num">${esc(B.label)}</th>`;
    html += '<th class="num">winner</th>';
    html += '</tr></thead><tbody>';
    const metrics = [
      { key: 'wall_s_median',                   label: 'wall median (s, ↓ better)',   unit: 's', dir: 'min' },
      { key: 'throughput_tok_per_s_mean_est',   label: 'throughput tok/s (↑ better)', unit: 't/s', dir: 'max' },
    ];
    for (const c of sortedCombos) {
      const ra = c.rows.find(r => r.set.id === A.id);
      const rb = c.rows.find(r => r.set.id === B.id);
      metrics.forEach((mk, mi) => {
        const va = ra ? Number(ra.summary[mk.key]) : NaN;
        const vb = rb ? Number(rb.summary[mk.key]) : NaN;
        let faster = '–';
        if (isFinite(va) && isFinite(vb) && va > 0 && vb > 0) {
          const ratio = mk.dir === 'min'
            ? Math.max(va, vb) / Math.min(va, vb)
            : Math.max(va, vb) / Math.min(va, vb);
          const winner = (mk.dir === 'min' ? (vb < va) : (vb > va)) ? B : A;
          faster = `${ratio.toFixed(2)}× <span class="sub">(${esc(winner.label)})</span>`;
        }
        html += '<tr>';
        if (mi === 0) {
          html += `<td class="label" rowspan="${metrics.length}">${esc(c.label)}</td>`;
        }
        html += `<td>${esc(mk.label)}</td>`;
        html += `<td class="num">${isFinite(va)?num(va,2):'–'} <span class="sub">${esc(mk.unit)}</span></td>`;
        html += `<td class="num">${isFinite(vb)?num(vb,2):'–'} <span class="sub">${esc(mk.unit)}</span></td>`;
        html += `<td class="num">${faster}</td>`;
        html += '</tr>';
      });
    }
    html += '</tbody></table></div>';
    html += `<p class="legend">"throughput" is end-to-end (output tokens ÷ wall time), so it includes agent startup, prompt processing, and any tool-call overhead. For raw model speed, see the <strong>direct backend</strong> rows below if you ran the <code>direct</code> agent.</p>`;
  }

  // Backend-direct precision stats — the `direct` pseudo-agent calls Ollama's
  // /api/generate and captures the model's actual eval/prompt token rates.
  const directRows = [];
  for (const s of sets) {
    for (const c of (s.data.combos || [])) {
      if ((c.agent || '').toLowerCase() !== 'direct') continue;
      // Average backend_stats across iterations
      const its = (c.iterations || []).filter(it => it.backend_stats);
      if (its.length === 0) continue;
      const avg = (key) => {
        const vals = its.map(it => Number(it.backend_stats?.[key])).filter(v => isFinite(v));
        return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
      };
      directRows.push({
        set: s, combo: c,
        eval_tok_per_s:   avg('eval_tok_per_s'),
        prompt_tok_per_s: avg('prompt_tok_per_s'),
        eval_count:       avg('eval_count'),
        prompt_eval_count: avg('prompt_eval_count'),
        load_s:           avg('load_s'),
        wall_s_median:    c.summary?.wall_s_median,
      });
    }
  }
  if (directRows.length) {
    html += `<h2>Direct backend stats <span class="sub">(model truth, no agent)</span></h2>`;
    html += '<div class="tbl-wrap"><table><thead><tr>';
    html += th('Combo','combo');
    html += th('Run','run');
    html += '<th class="num" title="The model\'s actual generation speed in tokens/sec, computed from the backend\'s eval_count ÷ eval_duration. This is the raw model rate — no agent overhead.">model eval tok/s</th>';
    html += '<th class="num" title="Prompt processing speed in tokens/sec, from prompt_eval_count ÷ prompt_eval_duration. Indicates how fast the model can ingest the system prompt + user message before generation starts.">prompt tok/s</th>';
    html += '<th class="num" title="Average number of tokens generated per iteration (eval_count from the backend).">tokens out</th>';
    html += '<th class="num" title="Average number of input tokens (prompt_eval_count from the backend) — total prompt size after templating.">tokens in</th>';
    html += '<th class="num" title="Time the model spent loading from disk into memory, averaged across iterations. After the first call this is usually near zero.">load (s)</th>';
    html += '<th class="num" title="Median total wall time per iteration for this direct backend call. Compare with the agent rows above to see overhead.">wall median (s)</th>';
    html += '</tr></thead><tbody>';
    for (const r of directRows) {
      html += '<tr>';
      html += `<td class="label">${esc(r.combo.label)}</td>`;
      html += `<td class="run-cell"><span class="swatch" style="background:${r.set.color}"></span>${esc(r.set.label)}</td>`;
      html += `<td class="num">${num(r.eval_tok_per_s, 1)}</td>`;
      html += `<td class="num">${num(r.prompt_tok_per_s, 1)}</td>`;
      html += `<td class="num">${num(r.eval_count, 0)}</td>`;
      html += `<td class="num">${num(r.prompt_eval_count, 0)}</td>`;
      html += `<td class="num">${num(r.load_s, 2)}</td>`;
      html += `<td class="num">${num(r.wall_s_median, 2)}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    html += `<p class="legend">These numbers come from Ollama's <code>/api/generate</code> response (<code>eval_count / eval_duration</code>). Subtract the agent's wall median from the direct row's wall median above to see how much time the agent itself adds.</p>`;
  }

  // Per-set details (collapsible) with quality info
  html += '<h2>Per-run details</h2>';
  for (const s of sets) {
    const cfg = s.data.config || {};
    html += `<details><summary><span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${s.color};margin-right:6px;vertical-align:middle"></span><strong>${esc(s.label)}</strong> — ${esc(s.data.platform || '')} — ${(s.data.combos || []).length} combos</summary>`;
    html += `<div class="meta" style="margin-top:0.6rem">timestamp: ${esc(s.data.timestamp || '')} · iters: ${esc(cfg.iterations)} (warmup ${esc(cfg.warmup)})</div>`;
    html += `<details style="margin-top:0.4rem"><summary>Show prompt</summary><pre>${esc(cfg.prompt || '')}</pre></details>`;
    html += '</details>';
  }

  report.innerHTML = html;
}

function render(data) {
  const cfg = data.config || {};
  const combos = data.combos || [];
  const pre = data.pre_existing || {};

  let html = '';
  html += `<div class="meta"><strong>${esc(data.timestamp)}</strong> · ${esc(data.platform)}<br>
    Model (Ollama): <code>${esc(cfg.model_ollama)}</code> · iterations: ${esc(cfg.iterations)} (warmup ${esc(cfg.warmup)})</div>`;

  // ---- Summary ----
  // Build per-column arrays so we can rank winners.
  const summaries = combos.map(c => c.summary || {});
  const cols = {
    wall_med:   summaries.map(s => s.wall_s_median),
    wall_mean:  summaries.map(s => s.wall_s_mean),
    wall_stdev: summaries.map(s => s.wall_s_stdev),
    ttft:       summaries.map(s => s.ttft_s_mean),
    throughput: summaries.map(s => s.throughput_tok_per_s_mean_est),
  };
  const dirs = { wall_med:'min', wall_mean:'min', wall_stdev:'min', ttft:'min', throughput:'max' };
  // Max-of-column for bar widths
  const maxOf = arr => Math.max(...arr.map(Number).filter(n => isFinite(n)), 0);
  const maxes = {
    wall_med: maxOf(cols.wall_med),
    wall_mean: maxOf(cols.wall_mean),
    wall_stdev: maxOf(cols.wall_stdev),
    ttft: maxOf(cols.ttft),
    throughput: maxOf(cols.throughput),
  };

  html += '<h2>Summary</h2><div class="tbl-wrap"><table><thead><tr>';
  html += th('Agent',   'agent');
  html += th('Backend', 'backend');
  html += th('Model',   'model');
  html += th('wall median (s)', 'wall_median', {num:true});
  html += th('wall mean (s)',   'wall_mean',   {num:true});
  html += th('wall stdev',      'wall_stdev',  {num:true});
  html += th('ttft mean (s)',   'ttft_mean',   {num:true});
  html += th('throughput tok/s','throughput',  {num:true});
  html += th('streamed',        'streamed');
  html += th('valid HTML',      'html');
  html += th('buttons',         'buttons');
  html += '</tr></thead><tbody>';
  combos.forEach((c, i) => {
    const s = c.summary || {};
    // Fall back to splitting label if structured fields missing (legacy results).
    const parts = (c.label || '').split('+');
    const agent   = c.agent   || parts[0] || '';
    const backend = c.backend || parts[1] || '';
    const model   = c.model_id|| parts[2] || '';
    html += '<tr>';
    html += `<td class="label">${esc(agent)}</td>`;
    html += `<td>${esc(backend)}</td>`;
    html += `<td>${esc(model)}</td>`;
    html += `<td class="num ${rankCls(cols.wall_med, i, dirs.wall_med)}">${bar(s.wall_s_median, maxes.wall_med)}</td>`;
    html += `<td class="num ${rankCls(cols.wall_mean, i, dirs.wall_mean)}">${bar(s.wall_s_mean, maxes.wall_mean)}</td>`;
    html += `<td class="num ${rankCls(cols.wall_stdev, i, dirs.wall_stdev)}">${num(s.wall_s_stdev, 2)}</td>`;
    html += `<td class="num ${rankCls(cols.ttft, i, dirs.ttft)}">${num(s.ttft_s_mean, 2)}</td>`;
    html += `<td class="num ${rankCls(cols.throughput, i, dirs.throughput)}">${bar(s.throughput_tok_per_s_mean_est, maxes.throughput, 'good')}</td>`;
    html += `<td>${badge(s.streamed_all)}</td>`;
    html += `<td>${badge(s.all_runs_html)}</td>`;
    html += `<td>${badge(s.all_runs_have_buttons)}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += `<p class="legend"><strong>★</strong> marks the winner per column. Lower is better for wall/ttft/stdev; higher is better for throughput.
    Throughput = est. output tokens ÷ wall time (end-to-end, includes prompt processing).
    Streamed = no → agent buffered the response, so ttft equals wall time.</p>`;

  // ---- Per-iteration ----
  html += '<h2>Per-iteration detail</h2>';
  for (const c of combos) {
    const its = c.iterations || [];
    const ic = {
      wall:   its.map(i => i.wall_s),
      ttft:   its.map(i => i.ttft_s),
      chars:  its.map(i => i.output_chars),
      tokens: its.map(i => i.output_tokens_est),
      tps:    its.map(i => i.throughput_tok_per_s_est),
    };
    html += `<section class="combo"><h3>${esc(c.label)}</h3><div class="tbl-wrap"><table><thead><tr>`;
    html += th('iter','iter');
    html += th('wall (s)','wall_s',{num:true});
    html += th('ttft (s)','ttft_s',{num:true});
    html += th('chars','chars',{num:true});
    html += th('tokens (est)','tokens_est',{num:true});
    html += th('tok/s','tok_per_s',{num:true});
    html += th('streamed','streamed');
    html += th('html?','html');
    html += th('buttons?','buttons');
    html += th('rc','rc',{num:true});
    html += th('output','output');
    html += '</tr></thead><tbody>';
    its.forEach((it, i) => {
      html += '<tr>';
      html += `<td class="num">${esc(it.iter)}</td>`;
      html += `<td class="num ${rankCls(ic.wall, i, 'min')}">${num(it.wall_s, 2)}</td>`;
      html += `<td class="num ${rankCls(ic.ttft, i, 'min')}">${num(it.ttft_s, 2)}</td>`;
      html += `<td class="num">${esc(it.output_chars)}</td>`;
      html += `<td class="num">${esc(it.output_tokens_est)}</td>`;
      html += `<td class="num ${rankCls(ic.tps, i, 'max')}">${num(it.throughput_tok_per_s_est, 2)}</td>`;
      html += `<td>${badge(it.streamed)}</td>`;
      html += `<td>${badge(it.looks_like_html)}</td>`;
      html += `<td>${badge(it.has_button)}</td>`;
      html += `<td class="num">${(it.rc === 0) ? '<span class="badge badge-yes">0</span>' : `<span class="badge badge-no">${esc(it.rc)}</span>`}</td>`;
      html += `<td><code>${esc(it.output_file)}</code></td>`;
      html += '</tr>';
    });
    html += '</tbody></table></div></section>';
  }

  html += `<h2>Prompt</h2><pre>${esc(cfg.prompt || '')}</pre>`;
  html += `<h2>Pre-flight inventory</h2><pre>${esc(JSON.stringify(pre, null, 2))}</pre>`;

  report.innerHTML = html;
  report.classList.remove('hidden');
}
</script>
</body>
</html>
